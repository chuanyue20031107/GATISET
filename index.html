<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🍲 肠格测试 · 十六型肠道人格</title>
    <!-- 字体与图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fbf5e8 0%, #f3e9d2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #2e241b;
        }
        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -8px rgba(90, 50, 30, 0.15);
            padding: 28px 24px 32px;
            border: 1px solid #f0dbc0;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 650;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            color: #4a3727;
            margin-bottom: 4px;
        }
        .subhead {
            font-size: 0.95rem;
            color: #7b5e47;
            margin-bottom: 24px;
            font-weight: 400;
            border-left: 5px solid #c9a87c;
            padding-left: 16px;
        }
        .progress-area {
            margin-bottom: 24px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #5e4533;
        }
        .progress-bar-bg {
            height: 10px;
            background: #e7d9c5;
            border-radius: 40px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b48c5c, #dbb486);
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .test-card {
            background: #fffcf5;
            border-radius: 32px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 12px 24px -8px rgba(70, 40, 20, 0.08);
            border: 1px solid #efe1cf;
        }
        .question-number {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            color: #a77b50;
            margin-bottom: 14px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 28px;
            color: #342419;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-btn {
            background: #faf3e9;
            border: 1.8px solid #e0cfba;
            border-radius: 26px;
            padding: 18px 20px;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 500;
            color: #3f2e1f;
            transition: all 0.15s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.02);
        }
        .option-btn i {
            font-size: 1.3rem;
            width: 24px;
            color: #b2906e;
        }
        .option-btn:hover {
            background: #efe0cf;
            border-color: #c4a176;
        }
        .option-btn.selected {
            background: #e7d2bc;
            border-color: #a47148;
            box-shadow: 0 6px 12px rgba(160, 100, 60, 0.1);
        }
        .option-btn.selected i {
            color: #7b4f2b;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            background: rgba(255,250,240,0.7);
            border: 1.8px solid #dac2a8;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #4e3824;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            flex: 1;
        }
        .btn-primary {
            background: #b07d4b;
            border-color: #b07d4b;
            color: white;
            box-shadow: 0 8px 18px -6px #c9a87c;
        }
        .btn-primary:hover {
            background: #9a6840;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .restart-btn {
            flex: 0.4;
            background: transparent;
        }
        .result-card {
            background: #fffcf5;
            border-radius: 36px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 30px -8px rgba(80, 50, 30, 0.12);
            border: 1px solid #ebdaca;
        }
        .result-type {
            font-size: 4.2rem;
            font-weight: 750;
            letter-spacing: 6px;
            color: #5a3f2b;
            margin: 8px 0 4px;
        }
        .type-nickname {
            font-size: 1.5rem;
            font-weight: 600;
            color: #7b5a3e;
            margin-bottom: 24px;
        }
        .dimension-bars {
            margin: 28px 0 20px;
            text-align: left;
        }
        .dimension-item {
            margin-bottom: 20px;
        }
        .dimension-label {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bar-left, .bar-right {
            font-weight: 600;
            width: 32px;
            color: #5e3f28;
        }
        .bar-bg {
            flex: 1;
            height: 12px;
            background: #e4d3be;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
        }
        .bar-fill-left {
            background: #a47148;
            height: 100%;
            width: 50%;
            border-radius: 40px 0 0 40px;
        }
        .bar-fill-right {
            background: #dbb486;
            height: 100%;
            width: 50%;
            border-radius: 0 40px 40px 0;
        }
        .description {
            background: #f6ede1;
            padding: 22px 18px;
            border-radius: 24px;
            margin: 28px 0 18px;
            font-size: 0.98rem;
            line-height: 1.55;
            color: #312219;
        }
        .action-group {
            display: flex;
            gap: 12px;
        }
        .hidden {
            display: none !important;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #9b8269;
            text-align: center;
        }
        i {
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h1>
            <i class="fas fa-seedling" style="color:#9f7e5e;"></i> 
            肠格·罗盘
        </h1>
        <div class="subhead">肠道耐受 · 营养供给 · 节律 · 屏障 — 你的十六型肠格</div>
    </header>

    <!-- 测试区 -->
    <div id="testSection">
        <div class="progress-area">
            <div class="progress-header">
                <span><i class="far fa-list-alt"></i> 肠检进度</span>
                <span id="progressText">0 / 20</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="test-card">
            <div class="question-number" id="questionNumLabel">第 1 题 · 耐受度</div>
            <div class="question-text" id="questionText">加载中...</div>
            <div class="options-container" id="optionsContainer"></div>
        </div>

        <div class="nav-buttons">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> 上一题</button>
            <button class="btn restart-btn" id="restartTestBtn"><i class="fas fa-rotate-left"></i> 重测</button>
            <button class="btn btn-primary" id="nextBtn" disabled>下一题 <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- 结果区 -->
    <div id="resultSection" class="hidden">
        <div class="result-card">
            <div style="margin-bottom: 6px;"><i class="fas fa-dna" style="color:#b48c5c;"></i> 你的肠格型号</div>
            <div class="result-type" id="resultTypeCode">GATI</div>
            <div class="type-nickname" id="resultNickname">天选干饭人</div>
            <div class="dimension-bars" id="dimensionBars"></div>
            <div class="description" id="typeDescription">肠道耐受、营养自给、节律顺畅、屏障稳固——干饭无惧。</div>
            <div class="action-group">
                <button class="btn restart-btn" id="retakeFromResultBtn" style="flex:1;"><i class="fas fa-undo-alt"></i> 重新探索</button>
            </div>
            <p style="margin-top: 18px; font-size:0.8rem; opacity:0.7;"><i class="far fa-comment"></i> 肠格仅供参考，严重不适请及时就医</p>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-utensils"></i> 每道题都是肠道的一面镜子 · 请凭第一直觉选择
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 肠格题库 (20题，维度: 耐受度(G/S) 1-5，营养供给(A/N) 6-10，节律(T/U) 11-15，屏障(I/D) 16-20) ----------
        const questions = [
            // 维度1：耐受度 G vs S (5题)
            { dimension: '耐受度', text: '冷热混吃（冰可乐配火锅）、爆辣重油后，你的肚子通常会？', optionA: '基本没反应，钢铁肠胃', optionB: '立刻腹痛/腹泻，马上找厕所', scoreA: 'G', scoreB: 'S' },
            { dimension: '耐受度', text: '跨省出差或旅行，换水土时你的肠道：', optionA: '极少不适，快速适应', optionB: '极易水土不服，闹肚子', scoreA: 'G', scoreB: 'S' },
            { dimension: '耐受度', text: '隔夜菜复热/猎奇尝鲜（如生腌、折耳根）之后：', optionA: '照常没事，肠胃耐造', optionB: '大概率胀气腹泻', scoreA: 'G', scoreB: 'S' },
            { dimension: '耐受度', text: '情绪紧张、焦虑时，肠道会跟着闹脾气吗？', optionA: '基本不影响，稳如老狗', optionB: '立刻腹痛/想跑厕所', scoreA: 'G', scoreB: 'S' },
            { dimension: '耐受度', text: '饥一顿饱一顿，或应酬连轴喝酒后：', optionA: '短暂不适，很快恢复', optionB: '肠道立刻翻车，难受好几天', scoreA: 'G', scoreB: 'S' },
            // 维度2：营养供给 A vs N (5题)
            { dimension: '营养供给', text: '日常饮食中，你的主食和蔬菜情况？', optionA: '精米白面/外卖为主，蔬菜少', optionB: '粗细搭配，足量深色蔬菜菌菇', scoreA: 'A', scoreB: 'N' },
            { dimension: '营养供给', text: '粗粮、杂豆、燕麦、浆果等富含膳食纤维的食物：', optionA: '很少吃，想不起来', optionB: '刻意保证，每天都有', scoreA: 'A', scoreB: 'N' },
            { dimension: '营养供给', text: '你更符合以下哪种？', optionA: '常吃零食/预制菜/代餐，添加剂多', optionB: '天然食材为主，少加工', scoreA: 'A', scoreB: 'N' },
            { dimension: '营养供给', text: '奶茶甜品、大鱼大肉的频率：', optionA: '高频，快乐源泉', optionB: '偶尔，整体均衡', scoreA: 'A', scoreB: 'N' },
            { dimension: '营养供给', text: '如果停掉益生菌/补剂，你的肠道感觉：', optionA: '可能会变差，依赖补剂', optionB: '依然稳定，饮食底子好', scoreA: 'A', scoreB: 'N' },
            // 维度3：节律 T vs U (5题)
            { dimension: '节律', text: '排便习惯最接近：', optionA: '每天固定时段，顺畅不费力', optionB: '毫无规律，便秘腹泻交替', scoreA: 'T', scoreB: 'U' },
            { dimension: '节律', text: '饭后胀气、小腹闷堵、肠鸣的情况：', optionA: '几乎没有，很安稳', optionB: '频繁出现，难受', scoreA: 'T', scoreB: 'U' },
            { dimension: '节律', text: '熬夜或饮食放纵后，排便节律多久恢复？', optionA: '1-2天自行恢复', optionB: '紊乱持续很久，甚至需药物', scoreA: 'T', scoreB: 'U' },
            { dimension: '节律', text: '是否经常有排便不尽感、粘马桶？', optionA: '很少，成形利落', optionB: '经常，黏腻冲不净', scoreA: 'T', scoreB: 'U' },
            { dimension: '节律', text: '久坐/憋便后，肠道反应：', optionA: '影响不大，很快调整', optionB: '立刻便秘或胀气加重', scoreA: 'T', scoreB: 'U' },
            // 维度4：屏障完整度 I vs D (5题)
            { dimension: '屏障', text: '近半年是否用过抗生素？', optionA: '没有，或极少', optionB: '用过，或经常使用', scoreA: 'I', scoreB: 'D' },
            { dimension: '屏障', text: '熬夜、昼夜颠倒的频率：', optionA: '作息规律，很少熬夜', optionB: '长期熬夜/倒班，睡眠差', scoreA: 'I', scoreB: 'D' },
            { dimension: '屏障', text: '饮酒习惯：', optionA: '不喝或偶尔小酌', optionB: '频繁应酬/酗酒', scoreA: 'I', scoreB: 'D' },
            { dimension: '屏障', text: '长期压力、焦虑内耗情况：', optionA: '情绪平稳，能自我调节', optionB: '高压内耗，持续焦虑', scoreA: 'I', scoreB: 'D' },
            { dimension: '屏障', text: '皮肤状态、免疫力、过敏情况？', optionA: '稳定，不易过敏/爆痘', optionB: '暗沉爆痘，易过敏/乏力', scoreA: 'I', scoreB: 'D' }
        ];

        // ---------- 16型肠格库 (根据文档整理) ----------
        const typeDetails = {
            "GNTI": { nickname: "无Bug玩家", desc: "强韧耐受＋内源自给＋规律顺畅＋屏障完整。肠道状态堪称完美，冷热混吃、换环境几乎无不适，有益菌主导，黏膜屏障稳固，免疫代谢在线。" },
            "GNTD": { nickname: "伪装者", desc: "饮食健康、排便顺畅，但屏障已受损。表面自信，却忽略熬夜/压力/抗生素的隐患，可能出现乏力爆痘，但仍坚信“我肠道很好”。" },
            "GNUI": { nickname: "忍者神龟", desc: "耐受好、营养足、屏障佳，但节律紊乱。久坐憋便、饮水少，肠道不蠕动，常常便秘胀气，明明硬件很好，却卡在“下水道”。" },
            "GNUD": { nickname: "人形陀螺/高压锅", desc: "耐受、营养不错，但节律紊乱＋屏障受损。工位一坐一天，熬夜加班、应酬喝酒、滥用抗生素，KPI压力拉满，肠道长期高压。" },
            "GATI": { nickname: "天选干饭人", desc: "耐受强、外补依赖、节律顺、屏障好。虽然常吃外卖/补剂，但肠道依然抗造，排便顺畅。又吃外卖又吃补剂，你这辈子有了！" },
            "GATD": { nickname: "小强COSER", desc: "表面耐受、排便顺畅，实则外补依赖＋屏障受损。假性健康，神经麻木，硬装没事，但内里已经开始透支。" },
            "GAUD": { nickname: "Dead-Duck 嘴硬学家", desc: "耐受强、外补依赖、节律紊乱、屏障受损。嘴上吹嘘铁肠胃，背地便秘胀气常备泻药。陷入嘴硬→造作→加重→焦虑的恶性循环。" },
            "GAUI": { nickname: "大便超人", desc: "耐受强、外补依赖、节律紊乱、屏障好。怎么乱吃都不拉肚子，却天天被便秘胀气折磨，干饭自由实现了，排便自由遥遥无期。" },
            "SNTI": { nickname: "豌豆公主", desc: "肠道敏感，但营养自给、节律顺、屏障好。把所有养肠动作做到极致，却依然逃不过肠道闹脾气，一点点风吹草动就敏感。" },
            "SNTD": { nickname: "自律二极管", desc: "敏感肠，但营养/节律自律；然而熬夜酗酒导致屏障受损。一边极致自律饮食，一边放纵伤害，肠道时好时坏。" },
            "SNUI": { nickname: "无效内卷人/内耗之王", desc: "敏感肠，营养好、节律乱、屏障好。饮食作息比谁都懂，却连基本的排便自由都没有，被腹泻和便秘反复折磨，养肠功课全白费。" },
            "SNUD": { nickname: "被鞭策的驴", desc: "肠道敏感所以饮食健康，但其他方向无限放纵：熬夜酗酒、久坐憋便，屏障受损＋节律紊乱。一边自律一边作死。" },
            "SATI": { nickname: "宣示者 FLAG", desc: "敏感＋外补依赖＋节律顺＋屏障好。每次大吃都肚子疼，但还要大吃。别人放屁是“噗”，你放屁是“吃完这顿就不吃了”。" },
            "SATD": { nickname: "摆烂人", desc: "敏感＋外补依赖＋节律顺＋屏障受损。肚子痛吃补剂，熬夜酗酒吃补剂，只要能拉就行，完全摆烂。" },
            "SAUI": { nickname: "休息者", desc: "敏感＋外补依赖＋节律紊乱＋屏障好。不好好吃饭、不按时上厕所，靠补剂活着，但身体还行，大概时间都用来休息了。" },
            "SAUD": { nickname: "瓷娃娃", desc: "敏感＋外补依赖＋节律紊乱＋屏障受损。啥啥都不行选手，肠道全线脆弱，一碰就碎。" }
        };

        // 状态
        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);
        let testCompleted = false;

        // DOM
        const testSection = document.getElementById('testSection');
        const resultSection = document.getElementById('resultSection');
        const questionText = document.getElementById('questionText');
        const questionNumLabel = document.getElementById('questionNumLabel');
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartTestBtn = document.getElementById('restartTestBtn');
        const retakeFromResultBtn = document.getElementById('retakeFromResultBtn');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const resultTypeCode = document.getElementById('resultTypeCode');
        const resultNickname = document.getElementById('resultNickname');
        const typeDescription = document.getElementById('typeDescription');
        const dimensionBars = document.getElementById('dimensionBars');

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percent = (answered / questions.length) * 100;
            progressFill.style.width = percent + '%';
            progressText.innerText = `${answered} / ${questions.length}`;
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            questionText.innerText = q.text;
            questionNumLabel.innerText = `第 ${currentIndex+1} 题 · ${q.dimension}`;
            const selected = answers[currentIndex];
            optionsDiv.innerHTML = `
                <div class="option-btn ${selected === q.scoreA ? 'selected' : ''}" data-opt="A">
                    <i class="fas fa-circle${selected === q.scoreA ? '' : '-thin'}"></i>
                    <span>${q.optionA}</span>
                </div>
                <div class="option-btn ${selected === q.scoreB ? 'selected' : ''}" data-opt="B">
                    <i class="fas fa-circle${selected === q.scoreB ? '' : '-thin'}"></i>
                    <span>${q.optionB}</span>
                </div>
            `;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const opt = btn.dataset.opt;
                    const val = opt === 'A' ? q.scoreA : q.scoreB;
                    answers[currentIndex] = val;
                    renderQuestion();
                    updateProgress();
                    updateNavButtons();
                });
            });
            updateNavButtons();
            updateProgress();
        }

        function updateNavButtons() {
            prevBtn.disabled = (currentIndex === 0);
            const hasAnswer = answers[currentIndex] !== null;
            if (currentIndex === questions.length - 1) {
                nextBtn.innerHTML = '查看肠格 <i class="fas fa-check-circle"></i>';
            } else {
                nextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
            }
            nextBtn.disabled = !hasAnswer;
        }

        function goToPrev() {
            if (currentIndex > 0) { currentIndex--; renderQuestion(); }
        }
        function goToNext() {
            if (!answers[currentIndex]) return;
            if (currentIndex === questions.length - 1) {
                finishTest();
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function finishTest() {
            if (answers.includes(null)) {
                alert('请回答所有题目后再查看肠格。');
                const firstNull = answers.findIndex(a => a === null);
                if (firstNull !== -1) { currentIndex = firstNull; renderQuestion(); }
                return;
            }
            testCompleted = true;
            
            // 统计维度
            let g=0, s=0, a=0, n=0, t=0, u=0, i=0, d=0;
            answers.forEach((ans, idx) => {
                const dim = questions[idx].dimension;
                if (dim === '耐受度') ans === 'G' ? g++ : s++;
                else if (dim === '营养供给') ans === 'A' ? a++ : n++;
                else if (dim === '节律') ans === 'T' ? t++ : u++;
                else if (dim === '屏障') ans === 'I' ? i++ : d++;
            });
            
            const typeCode = (g>=s?'G':'S') + (a>=n?'A':'N') + (t>=u?'T':'U') + (i>=d?'I':'D');
            const detail = typeDetails[typeCode] || { nickname: "未知肠格", desc: "独特而复杂的肠道人格。" };
            
            resultTypeCode.innerText = typeCode;
            resultNickname.innerText = detail.nickname;
            typeDescription.innerText = detail.desc;
            renderDimensionBars(g,s, a,n, t,u, i,d);
            
            testSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
        }

        function renderDimensionBars(g,s, a,n, t,u, i,d) {
            const createBar = (leftL, rightL, leftV, rightV) => {
                const total = leftV + rightV;
                const leftP = total===0 ? 50 : (leftV/total)*100;
                return `
                    <div class="dimension-item">
                        <div class="dimension-label"><span>${leftL} 倾向</span><span>${rightL} 倾向</span></div>
                        <div class="bar-container">
                            <span class="bar-left">${leftL}</span>
                            <div class="bar-bg"><div class="bar-fill-left" style="width:${leftP}%;"></div><div class="bar-fill-right" style="width:${100-leftP}%;"></div></div>
                            <span class="bar-right">${rightL}</span>
                        </div>
                    </div>
                `;
            };
            dimensionBars.innerHTML = 
                createBar('G 强韧', 'S 敏感', g, s) +
                createBar('A 外补', 'N 自给', a, n) +
                createBar('T 规律', 'U 紊乱', t, u) +
                createBar('I 稳固', 'D 受损', i, d);
        }

        function resetTest() {
            currentIndex = 0;
            answers = new Array(questions.length).fill(null);
            testCompleted = false;
            testSection.classList.remove('hidden');
            resultSection.classList.add('hidden');
            renderQuestion();
            updateProgress();
        }

        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);
        restartTestBtn.addEventListener('click', ()=>{
            if(confirm('重新开始会丢失当前进度，确定吗？')) resetTest();
        });
        retakeFromResultBtn.addEventListener('click', resetTest);

        // 键盘支持
        window.addEventListener('keydown', (e) => {
            if (testSection.classList.contains('hidden')) return;
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) goToPrev();
            else if (e.key === 'ArrowRight' && !nextBtn.disabled) goToNext();
        });

        renderQuestion();
        updateProgress();
    })();
</script>
</body>
</html>
