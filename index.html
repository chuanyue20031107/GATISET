<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🍲 肠格测试 · 十六型肠道人格</title>
    <!-- 字体与图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fbf5e8 0%, #f3e9d2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #2e241b;
        }
        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 20px 40px -8px rgba(90, 50, 30, 0.15);
            padding: 28px 24px 32px;
            border: 1px solid #f0dbc0;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 650;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            color: #4a3727;
            margin-bottom: 4px;
        }
        .subhead {
            font-size: 0.95rem;
            color: #7b5e47;
            margin-bottom: 24px;
            font-weight: 400;
            border-left: 5px solid #c9a87c;
            padding-left: 16px;
        }
        .progress-area {
            margin-bottom: 24px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #5e4533;
        }
        .progress-bar-bg {
            height: 10px;
            background: #e7d9c5;
            border-radius: 40px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b48c5c, #dbb486);
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .test-card {
            background: #fffcf5;
            border-radius: 32px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 12px 24px -8px rgba(70, 40, 20, 0.08);
            border: 1px solid #efe1cf;
        }
        .dimension-indicator {
            display: inline-block;
            background: #efe1cf;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 12px;
            color: #5e3f28;
        }
        .dimension-indicator i {
            margin-right: 6px;
        }
        .question-number {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            color: #a77b50;
            margin-bottom: 14px;
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 28px;
            color: #342419;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: #faf3e9;
            border: 1.8px solid #e0cfba;
            border-radius: 20px;
            padding: 16px 18px;
            text-align: left;
            font-size: 0.98rem;
            font-weight: 500;
            color: #3f2e1f;
            transition: all 0.15s;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.02);
        }
        .option-btn:hover {
            background: #efe0cf;
            border-color: #c4a176;
        }
        .option-btn.selected {
            background: #e7d2bc;
            border-color: #a47148;
            box-shadow: 0 6px 12px rgba(160, 100, 60, 0.1);
        }
        .option-score {
            display: inline-block;
            min-width: 32px;
            height: 32px;
            background: #d4b48c;
            color: white;
            border-radius: 16px;
            text-align: center;
            line-height: 32px;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .option-btn.selected .option-score {
            background: #8b5e3c;
        }
        .option-text {
            flex: 1;
            line-height: 1.4;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            background: rgba(255,250,240,0.7);
            border: 1.8px solid #dac2a8;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #4e3824;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            flex: 1;
        }
        .btn-primary {
            background: #b07d4b;
            border-color: #b07d4b;
            color: white;
            box-shadow: 0 8px 18px -6px #c9a87c;
        }
        .btn-primary:hover {
            background: #9a6840;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .restart-btn {
            flex: 0.4;
            background: transparent;
        }
        .result-card {
            background: #fffcf5;
            border-radius: 36px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 30px -8px rgba(80, 50, 30, 0.12);
            border: 1px solid #ebdaca;
        }
        .result-type {
            font-size: 4.2rem;
            font-weight: 750;
            letter-spacing: 6px;
            color: #5a3f2b;
            margin: 8px 0 4px;
        }
        .type-nickname {
            font-size: 1.5rem;
            font-weight: 600;
            color: #7b5a3e;
            margin-bottom: 24px;
        }
        .dimension-bars {
            margin: 28px 0 20px;
            text-align: left;
        }
        .dimension-item {
            margin-bottom: 20px;
        }
        .dimension-label {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bar-left, .bar-right {
            font-weight: 600;
            width: 32px;
            color: #5e3f28;
        }
        .bar-bg {
            flex: 1;
            height: 12px;
            background: #e4d3be;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
        }
        .bar-fill-left {
            background: #a47148;
            height: 100%;
            width: 50%;
            border-radius: 40px 0 0 40px;
        }
        .bar-fill-right {
            background: #dbb486;
            height: 100%;
            width: 50%;
            border-radius: 0 40px 40px 0;
        }
        .description {
            background: #f6ede1;
            padding: 22px 18px;
            border-radius: 24px;
            margin: 28px 0 18px;
            font-size: 0.98rem;
            line-height: 1.55;
            color: #312219;
        }
        .dimension-scores {
            margin-top: 16px;
            padding: 12px;
            background: #f0e6d8;
            border-radius: 16px;
            font-size: 0.85rem;
            color: #5a3f2b;
        }
        .action-group {
            display: flex;
            gap: 12px;
        }
        .hidden {
            display: none !important;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #9b8269;
            text-align: center;
        }
        i {
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h1>
            <i class="fas fa-seedling" style="color:#9f7e5e;"></i> 
            肠格·罗盘
        </h1>
        <div class="subhead">肠道耐受 · 营养供给 · 节律 · 屏障 — 你的十六型肠格</div>
    </header>

    <!-- 测试区 -->
    <div id="testSection">
        <div class="progress-area">
            <div class="progress-header">
                <span><i class="far fa-list-alt"></i> 肠检进度</span>
                <span id="progressText">0 / 20</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="test-card">
            <div class="dimension-indicator" id="dimensionTag">
                <i class="fas fa-shield-alt"></i> <span id="dimensionName">耐受度</span> 
                (<span id="dimensionRange">G ⇄ S</span>)
            </div>
            <div class="question-number" id="questionNumLabel">第 1 题</div>
            <div class="question-text" id="questionText">吃火锅、冰饮、重油外卖后，你的肠道状态是？</div>
            <div class="options-container" id="optionsContainer"></div>
        </div>

        <div class="nav-buttons">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> 上一题</button>
            <button class="btn restart-btn" id="restartTestBtn"><i class="fas fa-rotate-left"></i> 重测</button>
            <button class="btn btn-primary" id="nextBtn" disabled>下一题 <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- 结果区 -->
    <div id="resultSection" class="hidden">
        <div class="result-card">
            <div style="margin-bottom: 6px;"><i class="fas fa-dna" style="color:#b48c5c;"></i> 你的肠格型号</div>
            <div class="result-type" id="resultTypeCode">GATI</div>
            <div class="type-nickname" id="resultNickname">天选干饭人</div>
            <div class="dimension-bars" id="dimensionBars"></div>
            <div class="dimension-scores" id="dimensionScores"></div>
            <div class="description" id="typeDescription">肠道耐受、营养自给、节律顺畅、屏障稳固——干饭无惧。</div>
            <div class="action-group">
                <button class="btn restart-btn" id="retakeFromResultBtn" style="flex:1;"><i class="fas fa-undo-alt"></i> 重新探索</button>
            </div>
            <p style="margin-top: 18px; font-size:0.8rem; opacity:0.7;"><i class="far fa-comment"></i> 肠格仅供参考，严重不适请及时就医</p>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-utensils"></i> 每道题5个选项，分数越高越倾向左侧特质
    </div>
</div>

<script>
    (function(){
        "use strict";

        // 调试标志
        console.log('肠格测试初始化开始...');

        // ---------- 维度配置 ----------
        const dimensions = [
            { name: '耐受度', left: 'G', right: 'S', leftName: '强韧耐造', rightName: '娇嫩敏感' },
            { name: '营养供给', left: 'A', right: 'N', leftName: '外补依赖', rightName: '内源自给' },
            { name: '节律', left: 'T', right: 'U', leftName: '规律顺畅', rightName: '节律紊乱' },
            { name: '屏障', left: 'I', right: 'D', leftName: '稳固完整', rightName: '屏障受损' }
        ];

        // ---------- 肠格题库 (20题，每题5个选项，1-5分) ----------
        const questions = [
            // 维度1：耐受度 (5题) - 高分倾向G，低分倾向S
            { 
                dimension: 0, 
                text: '吃火锅、冰饮、重油外卖后，你的肠道状态是？',
                options: [
                    { text: '每次吃完都会腹痛、腹泻、胀气，非常难受', score: 1 },
                    { text: '多数时候吃完会肠胃不舒服，出现胀气、腹痛', score: 2 },
                    { text: '偶尔吃完会有轻微肠胃不适，很快就能缓解', score: 3 },
                    { text: '很少因为这类饮食出现肠胃不适，基本不受影响', score: 4 },
                    { text: '吃完完全没反应，肠道状态不受任何影响', score: 5 }
                ]
            },
            { 
                dimension: 0, 
                text: '跨省出差、旅行或换季时，你的肠道适应能力？',
                options: [
                    { text: '极易水土不服，每次都闹肚子、胀气', score: 1 },
                    { text: '经常出现不适，需要几天才能适应', score: 2 },
                    { text: '偶尔会有轻微反应，但很快恢复正常', score: 3 },
                    { text: '很少出现水土不服，适应能力较强', score: 4 },
                    { text: '从不水土不服，去哪吃啥都没问题', score: 5 }
                ]
            },
            { 
                dimension: 0, 
                text: '吃隔夜菜、生腌、猎奇食材后，你的肠道反应？',
                options: [
                    { text: '立刻腹痛腹泻，完全碰不得', score: 1 },
                    { text: '多数时候会不舒服，需要谨慎', score: 2 },
                    { text: '偶尔会有反应，但不太严重', score: 3 },
                    { text: '基本没事，偶尔轻微不适', score: 4 },
                    { text: '完全没反应，铁胃无疑', score: 5 }
                ]
            },
            { 
                dimension: 0, 
                text: '情绪紧张、焦虑、压力大时，肠道会跟着闹脾气吗？',
                options: [
                    { text: '每次情绪波动都会腹痛、想跑厕所', score: 1 },
                    { text: '经常因为情绪出现肠道不适', score: 2 },
                    { text: '偶尔会有反应，但不算严重', score: 3 },
                    { text: '很少受影响，肠道比较稳定', score: 4 },
                    { text: '完全不受情绪影响，肠道独立自主', score: 5 }
                ]
            },
            { 
                dimension: 0, 
                text: '饥一顿饱一顿、应酬连轴喝酒后，肠道状态？',
                options: [
                    { text: '立刻翻车，腹泻腹痛好几天', score: 1 },
                    { text: '经常出问题，需要小心呵护', score: 2 },
                    { text: '偶尔不适，但能接受', score: 3 },
                    { text: '短暂不适，很快恢复', score: 4 },
                    { text: '完全没事，耐造能力一流', score: 5 }
                ]
            },
            // 维度2：营养供给 (5题) - 高分倾向A，低分倾向N
            { 
                dimension: 1, 
                text: '你的日常主食和蔬菜摄入情况？',
                options: [
                    { text: '几乎全是精米白面/外卖，蔬菜很少', score: 5 },
                    { text: '以精加工为主，偶尔吃些蔬菜', score: 4 },
                    { text: '精粗各半，蔬菜时多时少', score: 3 },
                    { text: '有意识粗细搭配，蔬菜基本够', score: 2 },
                    { text: '全谷物杂豆充足，深色蔬菜每天必备', score: 1 }
                ]
            },
            { 
                dimension: 1, 
                text: '粗粮、燕麦、菌菇、浆果等富含膳食纤维的食物？',
                options: [
                    { text: '几乎不吃，想不起来', score: 5 },
                    { text: '很少吃，偶尔才碰', score: 4 },
                    { text: '有时吃，但不规律', score: 3 },
                    { text: '经常吃，有意识补充', score: 2 },
                    { text: '每天刻意保证，从不间断', score: 1 }
                ]
            },
            { 
                dimension: 1, 
                text: '你的饮食更符合以下哪种？',
                options: [
                    { text: '常吃零食/预制菜/代餐，添加剂多', score: 5 },
                    { text: '外卖为主，偶尔自己做', score: 4 },
                    { text: '外卖和自制各半', score: 3 },
                    { text: '以自制为主，少加工', score: 2 },
                    { text: '天然食材为主，几乎无添加剂', score: 1 }
                ]
            },
            { 
                dimension: 1, 
                text: '奶茶甜品、大鱼大肉、重油重盐的频率？',
                options: [
                    { text: '天天如此，快乐源泉', score: 5 },
                    { text: '经常吃，每周好几次', score: 4 },
                    { text: '偶尔放纵，不算频繁', score: 3 },
                    { text: '比较少，注意控制', score: 2 },
                    { text: '极少，整体清淡均衡', score: 1 }
                ]
            },
            { 
                dimension: 1, 
                text: '如果停掉益生菌/补剂/酵素，你的肠道会？',
                options: [
                    { text: '立刻变差，非常依赖补剂', score: 5 },
                    { text: '会明显变差，不太敢停', score: 4 },
                    { text: '可能有些影响，但不确定', score: 3 },
                    { text: '影响不大，偶尔才吃', score: 2 },
                    { text: '从不依赖补剂，饮食底子好', score: 1 }
                ]
            },
            // 维度3：节律 (5题) - 高分倾向T，低分倾向U
            { 
                dimension: 2, 
                text: '你的排便习惯最接近？',
                options: [
                    { text: '毫无规律，便秘腹泻交替，完全看运气', score: 1 },
                    { text: '经常紊乱，时好时坏', score: 2 },
                    { text: '基本有规律，但容易被打破', score: 3 },
                    { text: '比较规律，偶尔波动', score: 4 },
                    { text: '每天固定时段，顺畅不费力', score: 5 }
                ]
            },
            { 
                dimension: 2, 
                text: '饭后胀气、小腹闷堵、肠鸣的情况？',
                options: [
                    { text: '每顿饭后都难受，频繁胀气肠鸣', score: 1 },
                    { text: '经常出现，挺困扰的', score: 2 },
                    { text: '偶尔会有，不算严重', score: 3 },
                    { text: '很少出现，基本安稳', score: 4 },
                    { text: '几乎没有，消化顺畅', score: 5 }
                ]
            },
            { 
                dimension: 2, 
                text: '熬夜或饮食放纵后，排便节律多久恢复？',
                options: [
                    { text: '紊乱持续很久，甚至需要药物', score: 1 },
                    { text: '需要好几天才能调回来', score: 2 },
                    { text: '2-3天能恢复', score: 3 },
                    { text: '1-2天自行恢复', score: 4 },
                    { text: '几乎不受影响，当天就正常', score: 5 }
                ]
            },
            { 
                dimension: 2, 
                text: '排便不尽感、粘马桶的情况？',
                options: [
                    { text: '每次都这样，黏腻冲不净', score: 1 },
                    { text: '经常出现，挺烦人的', score: 2 },
                    { text: '偶尔会有', score: 3 },
                    { text: '很少，基本成形利落', score: 4 },
                    { text: '从不，完美顺畅', score: 5 }
                ]
            },
            { 
                dimension: 2, 
                text: '久坐、憋便后，肠道反应？',
                options: [
                    { text: '立刻便秘或胀气加重，非常敏感', score: 1 },
                    { text: '经常因此出现不适', score: 2 },
                    { text: '偶尔会受影响', score: 3 },
                    { text: '影响不大，很快调整', score: 4 },
                    { text: '完全不受影响', score: 5 }
                ]
            },
            // 维度4：屏障 (5题) - 高分倾向I，低分倾向D
            { 
                dimension: 3, 
                text: '近半年抗生素使用情况？',
                options: [
                    { text: '多次使用，或长期服用', score: 1 },
                    { text: '用过1-2次', score: 2 },
                    { text: '用过1次，短期', score: 3 },
                    { text: '几乎没用过', score: 4 },
                    { text: '完全没有，近一年都没用过', score: 5 }
                ]
            },
            { 
                dimension: 3, 
                text: '熬夜、昼夜颠倒的频率？',
                options: [
                    { text: '长期熬夜/倒班，睡眠严重不足', score: 1 },
                    { text: '经常熬夜，一周好几次', score: 2 },
                    { text: '偶尔熬夜，不算频繁', score: 3 },
                    { text: '很少熬夜，作息较规律', score: 4 },
                    { text: '作息规律，从不熬夜', score: 5 }
                ]
            },
            { 
                dimension: 3, 
                text: '饮酒习惯？',
                options: [
                    { text: '频繁应酬/酗酒，顿顿不离酒', score: 1 },
                    { text: '经常喝，每周好几次', score: 2 },
                    { text: '偶尔小酌，社交场合才喝', score: 3 },
                    { text: '很少喝，几乎不碰', score: 4 },
                    { text: '完全不喝酒', score: 5 }
                ]
            },
            { 
                dimension: 3, 
                text: '长期压力、焦虑内耗情况？',
                options: [
                    { text: '高压内耗，持续焦虑抑郁', score: 1 },
                    { text: '经常感到压力大，情绪紧张', score: 2 },
                    { text: '有时会有压力，但能调节', score: 3 },
                    { text: '偶尔有压力，整体平稳', score: 4 },
                    { text: '情绪稳定，心态平和', score: 5 }
                ]
            },
            { 
                dimension: 3, 
                text: '皮肤状态、免疫力、过敏情况？',
                options: [
                    { text: '暗沉爆痘，易过敏/感染，免疫力差', score: 1 },
                    { text: '经常有皮肤问题，容易生病', score: 2 },
                    { text: '时好时坏，不太稳定', score: 3 },
                    { text: '基本稳定，偶尔小问题', score: 4 },
                    { text: '皮肤好，免疫力强，很少过敏', score: 5 }
                ]
            }
        ];

        // ---------- 16型肠格库 ----------
        const typeDetails = {
            "GNTI": { nickname: "无Bug玩家", desc: "强韧耐受＋内源自给＋规律顺畅＋屏障完整。肠道状态堪称完美，冷热混吃、换环境几乎无不适，有益菌主导，黏膜屏障稳固，免疫代谢在线。" },
            "GNTD": { nickname: "伪装者", desc: "饮食健康、排便顺畅，但屏障已受损。表面自信，却忽略熬夜/压力/抗生素的隐患，可能出现乏力爆痘，但仍坚信\"我肠道很好\"。" },
            "GNUI": { nickname: "忍者神龟", desc: "耐受好、营养足、屏障佳，但节律紊乱。久坐憋便、饮水少，肠道不蠕动，常常便秘胀气，明明硬件很好，却卡在\"下水道\"。" },
            "GNUD": { nickname: "人形陀螺/高压锅", desc: "耐受、营养不错，但节律紊乱＋屏障受损。工位一坐一天，熬夜加班、应酬喝酒、滥用抗生素，KPI压力拉满，肠道长期高压。" },
            "GATI": { nickname: "天选干饭人", desc: "耐受强、外补依赖、节律顺、屏障好。虽然常吃外卖/补剂，但肠道依然抗造，排便顺畅。又吃外卖又吃补剂，你这辈子有了！" },
            "GATD": { nickname: "小强COSER", desc: "表面耐受、排便顺畅，实则外补依赖＋屏障受损。假性健康，神经麻木，硬装没事，但内里已经开始透支。" },
            "GAUD": { nickname: "Dead-Duck 嘴硬学家", desc: "耐受强、外补依赖、节律紊乱、屏障受损。嘴上吹嘘铁肠胃，背地便秘胀气常备泻药。陷入嘴硬→造作→加重→焦虑的恶性循环。" },
            "GAUI": { nickname: "大便超人", desc: "耐受强、外补依赖、节律紊乱、屏障好。怎么乱吃都不拉肚子，却天天被便秘胀气折磨，干饭自由实现了，排便自由遥遥无期。" },
            "SNTI": { nickname: "豌豆公主", desc: "肠道敏感，但营养自给、节律顺、屏障好。把所有养肠动作做到极致，却依然逃不过肠道闹脾气，一点点风吹草动就敏感。" },
            "SNTD": { nickname: "自律二极管", desc: "敏感肠，但营养/节律自律；然而熬夜酗酒导致屏障受损。一边极致自律饮食，一边放纵伤害，肠道时好时坏。" },
            "SNUI": { nickname: "无效内卷人/内耗之王", desc: "敏感肠，营养好、节律乱、屏障好。饮食作息比谁都懂，却连基本的排便自由都没有，被腹泻和便秘反复折磨，养肠功课全白费。" },
            "SNUD": { nickname: "被鞭策的驴", desc: "肠道敏感所以饮食健康，但其他方向无限放纵：熬夜酗酒、久坐憋便，屏障受损＋节律紊乱。一边自律一边作死。" },
            "SATI": { nickname: "宣示者 FLAG", desc: "敏感＋外补依赖＋节律顺＋屏障好。每次大吃都肚子疼，但还要大吃。别人放屁是\"噗\"，你放屁是\"吃完这顿就不吃了\"。" },
            "SATD": { nickname: "摆烂人", desc: "敏感＋外补依赖＋节律顺＋屏障受损。肚子痛吃补剂，熬夜酗酒吃补剂，只要能拉就行，完全摆烂。" },
            "SAUI": { nickname: "休息者", desc: "敏感＋外补依赖＋节律紊乱＋屏障好。不好好吃饭、不按时上厕所，靠补剂活着，但身体还行，大概时间都用来休息了。" },
            "SAUD": { nickname: "瓷娃娃", desc: "敏感＋外补依赖＋节律紊乱＋屏障受损。啥啥都不行选手，肠道全线脆弱，一碰就碎。" }
        };

        // 状态
        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null); // 存储分数1-5
        let testCompleted = false;

        // DOM 元素 - 添加空值检查
        function getElement(id) {
            const el = document.getElementById(id);
            if (!el) console.error(`元素 ${id} 未找到`);
            return el;
        }

        const testSection = getElement('testSection');
        const resultSection = getElement('resultSection');
        const questionText = getElement('questionText');
        const questionNumLabel = getElement('questionNumLabel');
        const dimensionName = getElement('dimensionName');
        const dimensionRange = getElement('dimensionRange');
        const optionsDiv = getElement('optionsContainer');
        const prevBtn = getElement('prevBtn');
        const nextBtn = getElement('nextBtn');
        const restartTestBtn = getElement('restartTestBtn');
        const retakeFromResultBtn = getElement('retakeFromResultBtn');
        const progressText = getElement('progressText');
        const progressFill = getElement('progressFill');
        const resultTypeCode = getElement('resultTypeCode');
        const resultNickname = getElement('resultNickname');
        const typeDescription = getElement('typeDescription');
        const dimensionBars = getElement('dimensionBars');
        const dimensionScores = getElement('dimensionScores');

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percent = (answered / questions.length) * 100;
            if (progressFill) progressFill.style.width = percent + '%';
            if (progressText) progressText.innerText = `${answered} / ${questions.length}`;
        }

        function renderQuestion() {
            console.log(`渲染第 ${currentIndex + 1} 题`);
            
            // 检查关键元素
            if (!questionText || !optionsDiv) {
                console.error('关键DOM元素缺失');
                return;
            }
            
            const q = questions[currentIndex];
            if (!q) {
                console.error('题目数据错误');
                return;
            }
            
            const dim = dimensions[q.dimension];
            
            // 更新题目文本
            questionText.innerText = q.text;
            questionNumLabel.innerText = `第 ${currentIndex+1} 题`;
            if (dimensionName) dimensionName.innerText = dim.name;
            if (dimensionRange) dimensionRange.innerText = `${dim.left} (强) ⇄ ${dim.right} (弱)`;
            
            const selectedScore = answers[currentIndex];
            
            // 生成选项HTML
            let html = '';
            q.options.forEach((opt, idx) => {
                const score = opt.score;
                const isSelected = (selectedScore === score);
                html += `
                    <div class="option-btn ${isSelected ? 'selected' : ''}" data-score="${score}">
                        <span class="option-score">${score}</span>
                        <span class="option-text">${opt.text}</span>
                    </div>
                `;
            });
            optionsDiv.innerHTML = html;
            
            // 绑定点击事件
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const score = parseInt(this.dataset.score);
                    answers[currentIndex] = score;
                    console.log(`第${currentIndex+1}题选择分数: ${score}`);
                    renderQuestion(); // 重新渲染高亮
                    updateProgress();
                    updateNavButtons();
                });
            });
            
            updateNavButtons();
            updateProgress();
        }

        function updateNavButtons() {
            if (prevBtn) prevBtn.disabled = (currentIndex === 0);
            const hasAnswer = answers[currentIndex] !== null;
            if (nextBtn) {
                if (currentIndex === questions.length - 1) {
                    nextBtn.innerHTML = '查看肠格 <i class="fas fa-check-circle"></i>';
                } else {
                    nextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
                }
                nextBtn.disabled = !hasAnswer;
            }
        }

        function goToPrev() {
            if (currentIndex > 0) { 
                currentIndex--; 
                renderQuestion(); 
            }
        }
        
        function goToNext() {
            if (answers[currentIndex] === null) return;
            if (currentIndex === questions.length - 1) {
                finishTest();
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function finishTest() {
            console.log('完成测试，计算结果...');
            
            if (answers.includes(null)) {
                alert('请回答所有题目后再查看肠格。');
                const firstNull = answers.findIndex(a => a === null);
                if (firstNull !== -1) { 
                    currentIndex = firstNull; 
                    renderQuestion(); 
                }
                return;
            }
            testCompleted = true;
            
            // 计算各维度总分 (每题1-5分，每个维度5题，总分5-25分)
            const scores = [0, 0, 0, 0]; // G/A/T/I 倾向分数
            
            answers.forEach((score, idx) => {
                const dim = questions[idx].dimension;
                scores[dim] += score;
            });
            
            console.log('维度得分:', scores);
            
            // 判定倾向：> 12.5 为左侧，≤ 12.5 为右侧
            const typeChars = [];
            for (let i = 0; i < 4; i++) {
                const totalScore = scores[i];
                const threshold = 12.5;
                if (totalScore > threshold) {
                    typeChars.push(dimensions[i].left);
                } else {
                    typeChars.push(dimensions[i].right);
                }
            }
            
            const typeCode = typeChars.join('');
            console.log('肠格类型:', typeCode);
            
            const detail = typeDetails[typeCode] || { nickname: "未知肠格", desc: "独特而复杂的肠道人格。" };
            
            if (resultTypeCode) resultTypeCode.innerText = typeCode;
            if (resultNickname) resultNickname.innerText = detail.nickname;
            if (typeDescription) typeDescription.innerText = detail.desc;
            
            renderDimensionBars(scores);
            renderDimensionScores(scores);
            
            if (testSection) testSection.classList.add('hidden');
            if (resultSection) resultSection.classList.remove('hidden');
        }

        function renderDimensionBars(scores) {
            if (!dimensionBars) return;
            
            const createBar = (dimIdx, leftLabel, rightLabel, score) => {
                const maxScore = 25;
                const leftPercent = (score / maxScore) * 100;
                const rightPercent = 100 - leftPercent;
                return `
                    <div class="dimension-item">
                        <div class="dimension-label">
                            <span>${leftLabel} (${score}分)</span>
                            <span>${rightLabel} (${maxScore - score}分)</span>
                        </div>
                        <div class="bar-container">
                            <span class="bar-left">${dimensions[dimIdx].left}</span>
                            <div class="bar-bg">
                                <div class="bar-fill-left" style="width:${leftPercent}%;"></div>
                                <div class="bar-fill-right" style="width:${rightPercent}%;"></div>
                            </div>
                            <span class="bar-right">${dimensions[dimIdx].right}</span>
                        </div>
                    </div>
                `;
            };
            
            dimensionBars.innerHTML = 
                createBar(0, 'G 强韧耐造', 'S 娇嫩敏感', scores[0]) +
                createBar(1, 'A 外补依赖', 'N 内源自给', scores[1]) +
                createBar(2, 'T 规律顺畅', 'U 节律紊乱', scores[2]) +
                createBar(3, 'I 稳固完整', 'D 屏障受损', scores[3]);
        }

        function renderDimensionScores(scores) {
            if (!dimensionScores) return;
            
            const dimNames = ['耐受度', '营养供给', '节律', '屏障'];
            const leftNames = ['强韧(G)', '外补(A)', '规律(T)', '稳固(I)'];
            const rightNames = ['敏感(S)', '自给(N)', '紊乱(U)', '受损(D)'];
            
            let html = '<div style="display:grid; gap:8px;">';
            for (let i = 0; i < 4; i++) {
                const score = scores[i];
                const tendency = score > 12.5 ? leftNames[i] : rightNames[i];
                html += `<div style="display:flex; justify-content:space-between;">
                    <span>${dimNames[i]}: ${score}/25分</span>
                    <span style="font-weight:600;">→ ${tendency}</span>
                </div>`;
            }
            html += '</div>';
            dimensionScores.innerHTML = html;
        }

        function resetTest() {
            console.log('重置测试');
            currentIndex = 0;
            answers = new Array(questions.length).fill(null);
            testCompleted = false;
            if (testSection) testSection.classList.remove('hidden');
            if (resultSection) resultSection.classList.add('hidden');
            renderQuestion();
            updateProgress();
        }

        // 绑定事件
        if (prevBtn) prevBtn.addEventListener('click', goToPrev);
        if (nextBtn) nextBtn.addEventListener('click', goToNext);
        if (restartTestBtn) {
            restartTestBtn.addEventListener('click', function() {
                if(confirm('重新开始会丢失当前进度，确定吗？')) resetTest();
            });
        }
        if (retakeFromResultBtn) {
            retakeFromResultBtn.addEventListener('click', resetTest);
        }

        // 键盘支持
        window.addEventListener('keydown', function(e) {
            if (testSection && testSection.classList.contains('hidden')) return;
            if (e.key === 'ArrowLeft' && prevBtn && !prevBtn.disabled) goToPrev();
            else if (e.key === 'ArrowRight' && nextBtn && !nextBtn.disabled) goToNext();
        });

        // 初始化渲染
        console.log('开始渲染第一题...');
        renderQuestion();
        updateProgress();
        console.log('初始化完成');
    })();
</script>
</body>
</html>
